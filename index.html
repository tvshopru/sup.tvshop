    <style>
        /* Hide the Lampa logo icon and title from the top header */
        .head__logo-icon, .head__title {
            display: none !important;
        }

        /* Remove the background image containing the Lampa text logo from the welcome screen, keeping the splash screen solid/dark */
        .welcome {
            background: #090b0e !important;
        }

        /* Pin the side menu so it is always visible (collapsed to 5em by default) */
        body:not(.light--version) .wrap__left {
            width: 5em !important;
            margin-left: 0 !important;
            visibility: visible !important;
        }
        body:not(.light--version) .wrap__left .menu__text {
            display: none !important;
        }

        /* Expand the side menu to 15em when active (opened) */
        body.menu--open:not(.light--version) .wrap__left {
            -webkit-transform: translate3d(0, 0, 0) !important;
            -moz-transform: translate3d(0, 0, 0) !important;
            transform: translate3d(0, 0, 0) !important;
        }
        body.menu--open:not(.light--version) .wrap__left > .scroll {
            width: 15em !important;
        }
        body.menu--open:not(.light--version) .wrap__left .menu__text {
            display: block !important;
        }
        body.menu--open:not(.light--version) .wrap__content {
            -webkit-transform: translate3d(10em, 0, 0) !important;
            -moz-transform: translate3d(10em, 0, 0) !important;
            transform: translate3d(10em, 0, 0) !important;
        }

        /* Hide all default Lampa menu items and split dividers to simplify the side panel */
        .menu__list .menu__item, .menu__split {
            display: none !important;
        }

        /* Keep only 'data-action="main"' (Главная) and our custom 'Админ-панель' and 'Инструкции' visible */
        .menu__list .menu__item[data-action="main"],
        .menu__list .menu__item.menu-item-admin,
        .menu__list .menu__item.menu-item-instructions {
            display: flex !important;
        }

        /* --- Custom TV Instructions Styles --- */
        .instructions-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: calc(100vh - 4.5em);
            box-sizing: border-box;
            padding: 1.5em;
            gap: 1.5em;
            overflow: hidden;
        }

        .instructions-left {
            display: flex;
            flex-direction: column;
            width: 50%;
            height: 100%;
            gap: 1.5em;
        }

        .instructions-right {
            width: 50%;
            height: 100%;
        }

        .instructions-card {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .instructions-step-badge {
            align-self: flex-start;
            background: #ffc107;
            color: #111;
            font-size: 0.9em;
            font-weight: 700;
            padding: 0.4em 1.0em;
            border-radius: 0.5em;
            text-transform: uppercase;

        .instructions-title {
            font-size: 1.8em;
            font-weight: 700;

        .instructions-text::-webkit-scrollbar {

        .instructions-text::-webkit-scrollbar-thumb {

        }

        .instructions-footer-hint {

            align-items: center;

        }

        .instructions-image-card {

            justify-content: center;

<body style="background: #1d1f20;">
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            var errDiv = document.getElementById('debug-error-overlay');
            if (!errDiv) {
                errDiv = document.createElement('div');
                errDiv.id = 'debug-error-overlay';
                errDiv.style.position = 'fixed';
                errDiv.style.top = '10px';
                errDiv.style.left = '10px';
                errDiv.style.width = 'calc(100% - 20px)';
                errDiv.style.maxHeight = 'calc(100% - 20px)';
                errDiv.style.background = 'rgba(233, 30, 99, 0.95)';
                errDiv.style.color = '#fff';
                errDiv.style.padding = '20px';
                errDiv.style.borderRadius = '8px';
                errDiv.style.zIndex = '9999999';
                errDiv.style.fontFamily = 'monospace';
                errDiv.style.fontSize = '14px';
                errDiv.style.overflowY = 'auto';
                errDiv.style.boxShadow = '0 0 20px rgba(0,0,0,0.5)';
                document.body.appendChild(errDiv);
            }
            
            var errorInfo = document.createElement('div');
            errorInfo.style.marginBottom = '15px';
            errorInfo.style.borderBottom = '1px dashed rgba(255,255,255,0.3)';
            errorInfo.style.paddingBottom = '15px';
            
            var details = document.createElement('pre');
            details.style.margin = '0';
            details.style.whiteSpace = 'pre-wrap';
            details.style.wordBreak = 'break-all';
            details.innerText = 'Error: ' + message + '\nSource: ' + source + '\nLine: ' + lineno + ', Col: ' + colno + '\nStack: ' + (error && error.stack ? error.stack : 'N/A');
            
            errorInfo.appendChild(details);
            errDiv.appendChild(errorInfo);
            return false;
        };

        window.youtube_lazy_load = true;

        // Preset Lampa settings to bypass mirrors and first-run prompts

        function urlJoin(base, add) {
            if (base.charAt(base.length - 1) !== '/') {
                base += '/'
            }

            return base + add
        }

        function putScript(scripts, onload, onerror){
            var add = function(src){
                console.log('Loader', 'try-load-script', src)

                var trys = 0

                var sreateScript = function(){
                    var script = document.createElement('script')

                    script.type = 'text/javascript'

                    script.onload = script.onreadystatechange = function(e) {
                        console.log('Loader', 'Script loaded', e)

                        if (!!onload) onload()
                    };

                    script.onerror = function(){
                        trys++

                        console.log('Loader', 'error-load-script', src)

                        if(trys < 3){
                            sreateScript()
                        } else if (!!onerror) {
                            onerror()
                        } else{
                            $('.no-network').removeClass('hide')

                            $('.no-network__file').text(window.location.href + '/' + src)
                        }
                    }

                    script.src = src

                    document.getElementsByTagName('body')[0].appendChild(script)
                }

                sreateScript()
            }

            add(scripts)
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function migrateInstructions(instructions) {
            if (!instructions || !Array.isArray(instructions)) return [];
            if (instructions.length > 0 && (instructions[0].text !== undefined || instructions[0].imageUrl !== undefined)) {
                // Old flat structure, wrap it into a single instruction
                return [{
                    id: 'inst-default',
                    title: 'Общая инструкция',
                    steps: instructions
                }];
            }
            return instructions;
        }

        function mergeConfigs(loaded, defaults) {
            if (!loaded || typeof loaded !== 'object') return defaults;
            var result = $.extend(true, {}, defaults, loaded);
            if (loaded.news && Array.isArray(loaded.news)) {
                result.news = loaded.news;
            }
            if (loaded.instructions && Array.isArray(loaded.instructions)) {
                result.instructions = migrateInstructions(loaded.instructions);
            }
            return result;
        }

        window.loadPortalConfig = function(callback) {
            console.log('PortalConfig', 'Loading configuration...');
            var url = 'config.json';
            if (location.protocol !== 'file:') {
                url += '?v=' + (new Date().getTime());
            }
            $.getJSON(url, function(data) {
                window.portal_config = mergeConfigs(data, getDefaultConfig());
                console.log('PortalConfig', 'Loaded from config.json', window.portal_config);
                if (callback) callback();
            }).fail(function() {
                var local = localStorage.getItem('portal_config');
                if (local) {
                    try {
                        var parsed = JSON.parse(local);
                        window.portal_config = mergeConfigs(parsed, getDefaultConfig());
                        console.log('PortalConfig', 'Loaded from localStorage', window.portal_config);
                    } catch(e) {
                        window.portal_config = getDefaultConfig();
                    }
                } else {
                    window.portal_config = getDefaultConfig();
                }
                if (callback) callback();
            });
        };

        function pushConfigToGithub(repo, token, path, branch, config) {
            var url = 'https://api.github.com/repos/' + repo + '/contents/' + path;
            
            // Получаем SHA существующего файла
            $.ajax({
                url: url + '?ref=' + branch + '&_t=' + (new Date().getTime()),
                type: 'GET',
                cache: false,
                headers: {
                    'Authorization': 'token ' + token,
                    'Accept': 'application/vnd.github.v3+json'
                },
                success: function(data) {
                    var sha = data.sha;
                    commitConfig(url, token, branch, config, sha);
                },
                error: function(xhr) {
                    if (xhr.status === 404) {
                        commitConfig(url, token, branch, config, null);
                    } else {
                        Lampa.Noty.show('Ошибка GitHub GET: ' + xhr.status);
                    }
                }
            });
        }

        function commitConfig(url, token, branch, config, sha) {
            var content = btoa(unescape(encodeURIComponent(JSON.stringify(config, null, 2))));
            var payload = {
                message: 'Обновление конфигурации портала через админ-панель',
                content: content,
                branch: branch
            };
            if (sha) payload.sha = sha;

            $.ajax({
                url: url,
                type: 'PUT',
                headers: {
                    'Authorization': 'token ' + token,
                    'Accept': 'application/vnd.github.v3+json'
                },
                data: JSON.stringify(payload),
                success: function() {
                    Lampa.Noty.show('Успешно сохранено и синхронизировано с GitHub!');
                },
                error: function(xhr) {
                    Lampa.Noty.show('Ошибка сохранения на GitHub: ' + xhr.status);
                }
            });
        }

            function InstructionsComponent(object) {
                var html = $('<div class="instructions-container"></div>');
                var current_step = 0;
                var is_zoomed = false;
                var selected_inst_idx = 0;
                var is_selection = true;

                this.create = function () {
                    var _this = this;
                    this.activity.loader(true);
                    
                    window.loadPortalConfig(function() {
                        _this.activity.loader(false);
                        _this.buildSelection();
                        _this.activity.toggle();
                    });
                };

                this.buildSelection = function () {
                    var config = window.portal_config || getDefaultConfig();
                    var instList = config.instructions || [];
                    instList = migrateInstructions(instList);
                    
                    html.empty();
                    is_selection = true;

                    if (!instList.length) {
                        html.html('<div style="color:rgba(255,255,255,0.4); text-align:center; width:100%; padding: 4em;">Нет доступных инструкций</div>');
                        return;
                    }

                    var selection_html = 
                        '<div class="instructions-selection-container" style="display:flex; flex-direction:column; width:100%; height:calc(100vh - 4.5em); padding: 2em; box-sizing:border-box; gap:1.5em; overflow:hidden;">' +
                            '<h1 style="color:#fff; font-size:1.8em; font-weight:700; margin: 0 0 0.5em 0; border-left: 4px solid #ffc107; padding-left: 0.6em;">Выберите инструкцию</h1>' +
                            '<div class="instructions-selection-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:1.5em; overflow-y:auto; flex-grow:1; padding-bottom: 1em;"></div>' +
                        '</div>';

                    var container = $(selection_html);
                    var list = container.find('.instructions-selection-list');

                    instList.forEach(function(inst, idx) {
                        var stepsCount = inst.steps ? inst.steps.length : 0;
                        var card = $(
                            '<div class="dashboard-card selector instruction-select-card" data-inst-index="' + idx + '" style="cursor:pointer; display:flex; flex-direction:column; justify-content:space-between; height: 160px;">' +
                                '<div>' +
                                    '<div style="font-weight:700; font-size:1.35em; color:#fff; line-height:1.3; margin-bottom: 0.4em;">' + escapeHtml(inst.title) + '</div>' +
                                    '<div style="color:rgba(255,255,255,0.5); font-size:0.95em;">Пошаговое руководство</div>' +
                                '</div>' +
                                '<div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(255,255,255,0.08); padding-top:0.6em; margin-top:1em;">' +
                                    '<span style="color:#ffc107; font-size:0.95em; font-weight:700;">Шагов: ' + stepsCount + '</span>' +
                                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:1.2em;height:1.2em;color:#ffc107;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>' +
                                '</div>' +
                            '</div>'
                        );
                        list.append(card);
                    });

                    html.append(container);

                    var _this = this;
                    html.find('.selector').on('hover:enter click', function() {
                        var idx = parseInt($(this).attr('data-inst-index'));
                        _this.selectInstruction(idx);
                    });
                };

                this.selectInstruction = function (idx) {
                    selected_inst_idx = idx;
                    current_step = 0;
                    is_selection = false;
                    this.buildStep();
                    Lampa.Controller.toggle('content');
                };

                this.exitToSelection = function () {
                    is_selection = true;
                    this.buildSelection();
                    Lampa.Controller.toggle('content');
                };

                this.buildStep = function () {
                    var config = window.portal_config || getDefaultConfig();
                    var instList = config.instructions || [];
                    instList = migrateInstructions(instList);
                    
                    html.empty();

                    if (selected_inst_idx < 0 || selected_inst_idx >= instList.length) {
                        this.exitToSelection();
                        return;
                    }

                    var inst = instList[selected_inst_idx];
                    var steps = inst.steps || [];

                    if (!steps.length) {
                        var empty_html = 
                            '<div class="instructions-container" style="display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:calc(100vh - 4.5em);">' +
                                '<div style="color:rgba(255,255,255,0.4); text-align:center; padding: 2em; font-size:1.2em;">В этой инструкции пока нет шагов</div>' +

                            '</div>';
                        html.html(empty_html);
                        
                        var _this = this;
                        html.find('.selector').on('hover:enter click', function() {
                            _this.exitToSelection();
                        });
                        return;
                    }

                    if (current_step < 0) current_step = 0;
                    if (current_step >= steps.length) current_step = steps.length - 1;

                    var step = steps[current_step];
                    var stepNum = current_step + 1;
                    var totalSteps = steps.length;

                    var step_inner_html = 
                        '<div class="instructions-left">' +

                                    '<div style="color:rgba(255,255,255,0.4); font-size:0.9em; font-weight:bold;">' + escapeHtml(inst.title) + '</div>' +
                                '</div>' +
                                '<h2 class="instructions-title">' + escapeHtml(step.title) + '</h2>' +
                                '<div class="instructions-text">' + escapeHtml(step.text).replace(/\n/g, '<br>') + '</div>' +
                                '<div class="instructions-footer-hint">' +
                                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:1.2em;height:1.2em;margin-right:0.4em;"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>' +
                                    '<span>Влево/Вправо для перелистывания. OK для увеличения фото. BACK для выхода к списку.</span>' +
                                '</div>' +
                            '</div>' +
                         '</div>' +
                         '<div class="instructions-right">' +
                             '<div class="dashboard-card instructions-image-card">' +

                                 '</div>' +
                             '</div>' +
                         '</div>';

                    html.html(step_inner_html);

                    var _this = this;
                    html.find('.selector').on('hover:enter click', function() {
                        _this.toggleZoom();
                    });
                };

                this.toggleZoom = function() {
                    is_zoomed = !is_zoomed;
                    var img = html.find('.instructions-image');
                    if (is_zoomed) {
                        img.addClass('zoomed');
                        Lampa.Noty.show('Нажмите ОК или НАЗАД для возврата');

                        img.removeClass('zoomed');

                            Lampa.Controller.collectionFocus(html.find('.selector').first()[0], html);
                        },

                                _this.toggleZoom();
                            } else if (is_selection) {
                                if (Navigator.canmove('left')) Navigator.move('left');
                                else Lampa.Controller.toggle('menu');
                            } else {
                                if (current_step > 0) {
                                    current_step--;
                                    _this.buildStep();
                                    Lampa.Controller.toggle('content');
                                } else {
                                    _this.exitToSelection();
                                }
                            }
                        },
                        right: function right() {
                            if (_this.isZoomed()) {
                                _this.toggleZoom();
                            } else if (is_selection) {
                                if (Navigator.canmove('right')) Navigator.move('right');
                            } else {
                                var config = window.portal_config || getDefaultConfig();
                                var instList = config.instructions || [];
                                instList = migrateInstructions(instList);
                                var steps = (instList[selected_inst_idx]) ? (instList[selected_inst_idx].steps || []) : [];

                                    current_step++;
                                    _this.buildStep();
                                    Lampa.Controller.toggle('content');
                                }
                            }
                        },

                            if (_this.isZoomed()) {
                                _this.toggleZoom();
                            } else if (is_selection) {
                                if (Navigator.canmove('up')) Navigator.move('up');
                                else Lampa.Controller.toggle('head');
                            } else {
                                Lampa.Controller.toggle('head');
                            }
                        },
                        down: function down() {
                            if (_this.isZoomed()) {
                                _this.toggleZoom();
                            } else if (is_selection) {
                                if (Navigator.canmove('down')) Navigator.move('down');
                            }
                        },
                        back: function back() {
                            if (_this.isZoomed()) {
                                _this.toggleZoom();
                            } else if (is_selection) {
                                Lampa.Activity.backward();
                            } else {
                                _this.exitToSelection();
                            }
                        }
                    });
                    Lampa.Controller.toggle('content');
                };

                this.isZoomed = function() {
                    return is_zoomed;
                };

                this.pause = function () {};

                this.destroy = function () {
                    if (html) html.remove();
                };

                this.render = function (native) {
                    return native ? html[0] : html;
                };
            }

                    html.find('.selector').on('hover:focus', function() {

                    });

                    html.on('hover:enter click', 'input, textarea', function(e) {
                        $(this).focus();
                    });

                    html.on('keydown keyup keypress', 'input, textarea', function(e) {
                        // Stop propagation so Lampa does not intercept backspace/escape/arrows
                        e.stopPropagation();
                        if (e.type === 'keydown') {
                            var isTextarea = $(this).is('textarea');
                            if (e.keyCode === 27 || (e.keyCode === 13 && !isTextarea)) {
                                $(this).blur();
                                Lampa.Controller.toggle('content');
                            }
                        }
                    });

                    html.on('input change', 'input, textarea', function() {
                        gatherFormValues();
                    });

                    this.activity.toggle();
                };

                this.start = function () {
                    Lampa.Controller.add('content', {
                        toggle: function toggle() {
                            Lampa.Controller.collectionSet(html);

                };

                this.pause = function () {};
