    <style>
        /* Hide the Lampa logo icon and title from the top header */
        .head__logo-icon, .head__title {
            display: none !important;
        }

        /* Remove the background image containing the Lampa text logo from the welcome screen, keeping the splash screen solid/dark */
        .welcome {
            background: #090b0e !important;
        }

        /* Pin the side menu so it is always visible (collapsed to 5em by default) */
        body:not(.light--version) .wrap__left {
            width: 5em !important;
            margin-left: 0 !important;
            visibility: visible !important;
        }
        body:not(.light--version) .wrap__left .menu__text {
            display: none !important;
        }

        /* Expand the side menu to 15em when active (opened) */
        body.menu--open:not(.light--version) .wrap__left {
            -webkit-transform: translate3d(0, 0, 0) !important;
            -moz-transform: translate3d(0, 0, 0) !important;
            transform: translate3d(0, 0, 0) !important;
        }
        body.menu--open:not(.light--version) .wrap__left > .scroll {
            width: 15em !important;
        }
        body.menu--open:not(.light--version) .wrap__left .menu__text {
            display: block !important;
        }
        body.menu--open:not(.light--version) .wrap__content {
            -webkit-transform: translate3d(10em, 0, 0) !important;
            -moz-transform: translate3d(10em, 0, 0) !important;
            transform: translate3d(10em, 0, 0) !important;
        }

        /* --- Custom TV Dashboard Styles --- */
        .dashboard-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: calc(100vh - 4.5em);
            box-sizing: border-box;
            padding: 1.5em;
            gap: 1.5em;
            overflow: hidden;
        }

        .dashboard-left {
            display: flex;
            flex-direction: column;
            width: 55%;
            height: 100%;
            gap: 1.5em;
        }

        .dashboard-right {
            width: 45%;
            height: 100%;
        }

        /* Glassmorphic card styling matching Lampa's aesthetics */
        .dashboard-card {
            background: rgba(20, 24, 33, 0.65);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.2em;
            padding: 1.5em;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .support-card {
            height: calc(50% - 0.75em);
        }

        .promo-card {
            height: calc(50% - 0.75em);
        }

        .news-card {
            height: 100%;
        }

        .card-title {
            font-size: 1.5em;
            font-weight: 700;
            color: #fff;
            margin: 0 0 0.8em 0;
            border-left: 4px solid #ffc107; /* Lampa's native gold color */
            padding-left: 0.6em;
            line-height: 1.2;
        }

        /* Focus state matching Lampa key highlight style */
        .dashboard-card.selector.focus, .news-item.selector.focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #ffc107;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.35);
        }

        /* Support Card Content */
        .support-content {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 1.5em;
            flex-grow: 1;
        }

        .support-text {
            flex: 1;
        }

        .support-text p {
            color: rgba(255, 255, 255, 0.75);
            font-size: 1.05em;
            line-height: 1.5;
            margin: 0 0 0.8em 0;
        }

        .support-tg {
            font-size: 1.3em;
            font-weight: 700;
            color: #ffc107;
            background: rgba(255, 193, 7, 0.12);
            padding: 0.4em 0.8em;
            border-radius: 0.4em;
            display: inline-block;
        }

        .support-qr-wrapper {
            background: #fff;
            padding: 0.6em;
            border-radius: 0.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 150px;
            height: 150px;
            min-width: 150px;
            min-height: 150px;
            box-sizing: border-box;
        }

        .support-qr {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Promo Card Content */
        .promo-badge {
            position: absolute;
            top: 1.5em;
            right: 1.5em;
            background: #e91e63;
            color: #fff;
            font-size: 0.8em;
            font-weight: 700;
            padding: 0.3em 0.8em;
            border-radius: 1em;
            text-transform: uppercase;
        }

        .promo-text {
            color: rgba(255, 255, 255, 0.75);
            font-size: 1.05em;
            line-height: 1.5;
            margin: 0 0 1.2em 0;
            flex-grow: 1;
        }

        .promo-action {
            align-self: flex-start;
            background: #ffc107;
            color: #111;
            font-size: 1.1em;
            font-weight: 700;
            padding: 0.6em 1.5em;
            border-radius: 0.6em;
            transition: background 0.2s;
        }

        .promo-card.focus .promo-action {
            background: #fff;
        }

        /* News Card Content */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 1em;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 0.5em;
            position: relative;
        }

        .news-list::-webkit-scrollbar {
            width: 6px;
        }
        .news-list::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .news-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        .news-item {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.8em;
            padding: 1em;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .news-date {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 0.4em;
        }

        .news-item-title {
            font-size: 1.25em;
            font-weight: 700;
            color: #fff;
            margin: 0 0 0.5em 0;
        }

        .news-item-desc {
            font-size: 1.0em;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1.4;
            margin: 0;
        }
    </style>

<body style="background: #1d1f20;">
    <script>
        window.youtube_lazy_load = true;

        // Preset Lampa settings to bypass mirrors and first-run prompts
        window.lampa_settings = {
            mirrors: false,
            account_use: false,
            lang_use: false
        };

        // Preset language selection to Russian and pin sidebar
        if (!localStorage.getItem('language')) {
            localStorage.setItem('language', 'ru');
            localStorage.setItem('tmdb_lang', 'ru');
        }
        localStorage.setItem('menu_always', 'true');
    </script>

    <div class="welcome"></div>

    <div id="app">

    </div>

    <div class="no-network hide">
        <div class="no-network__title">Ошибка</div>
        <div class="no-network__desc">Не удалось загрузить файл: <span class="no-network__file"></span></div>
    </div>
    
    <script src="./webos/webOSTV.js"></script>

    <script>
        var lampa_url     = '';
        var cache_version = Math.floor((new Date()).getTime() / 9e5); // Новое значение каждые 15 минут
            
        function urlJoin(base, add) {
            if (base.charAt(base.length - 1) !== '/') {
                base += '/'
            }

            return base + add
        }

        function putScript(scripts, onload, onerror){
            var add = function(src){
                console.log('Loader', 'try-load-script', src)

                var trys = 0

                var sreateScript = function(){
                    var script = document.createElement('script')

                    script.type = 'text/javascript'

                    script.onload = script.onreadystatechange = function(e) {
                        console.log('Loader', 'Script loaded', e)

                        if (!!onload) onload()
                    };

                    script.onerror = function(){
                        trys++

                        console.log('Loader', 'error-load-script', src)

                        if(trys < 3){
                            sreateScript()
                        } else if (!!onerror) {
                            onerror()
                        } else{
                            $('.no-network').removeClass('hide')

                            $('.no-network__file').text(window.location.href + '/' + src)
                        }
                    }

                    script.src = src

                    document.getElementsByTagName('body')[0].appendChild(script)
                }

                sreateScript()
            }

            add(scripts)
        }

        window.registerCustomMainComponent = function() {
            if (window.customMainRegistered) return;
            window.customMainRegistered = true;
            
            console.log('CustomMain', 'Registering Main Component');

            function CustomMain(object) {
                var html;
                var active_element = null;

                this.create = function () {
                    var _this = this;
                    this.activity.loader(false);
                    
                    var dashboard_html = 
                        '<div class="dashboard-container">' +
                            '<div class="dashboard-left">' +
                                '<!-- Support Card -->' +
                                '<div class="dashboard-card support-card selector" data-card="support">' +
                                    '<h2 class="card-title">Техническая поддержка</h2>' +
                                    '<div class="support-content">' +
                                        '<div class="support-text">' +
                                            '<p>Для связи с нашей техподдержкой отсканируйте этот QR-код с телефона или перейдите по контакту Telegram:</p>' +
                                            '<div class="support-tg">@android_tv_shop</div>' +
                                        '</div>' +
                                        '<div class="support-qr-wrapper">' +
                                            '<img class="support-qr" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://t.me/android_tv_shop" alt="QR-код поддержки">' +
                                        '</div>' +
                                    '</div>' +
                                '</div>' +
                                '<!-- Promo Card -->' +
                                '<div class="dashboard-card promo-card selector" data-card="promo">' +
                                    '<div class="promo-badge">Премиум ТВ</div>' +
                                    '<h2 class="card-title">Платный проект ТВ</h2>' +
                                    '<p class="promo-text">Более 1000 ТВ-каналов в HD и 4K качестве с архивом за 7 дней и полной медиатекой фильмов! Стабильное вещание без зависаний по всему миру.</p>' +
                                    '<div class="promo-action">Подключить за 1$</div>' +
                                '</div>' +
                            '</div>' +
                            '<div class="dashboard-right">' +
                                '<!-- News Card -->' +
                                '<div class="dashboard-card news-card">' +
                                    '<h2 class="card-title">Новости и обновления</h2>' +
                                    '<div class="news-list">' +
                                        '<div class="news-item selector" data-card="news-1">' +
                                            '<div class="news-date">14 июня 2026</div>' +
                                            '<h3 class="news-item-title">Запуск обновленной версии портала</h3>' +
                                            '<p class="news-item-desc">Мы обновили дизайн и структуру главной страницы. Теперь вся информация о поддержке и новостях доступна в один клик без прокрутки.</p>' +
                                        '</div>' +
                                        '<div class="news-item selector" data-card="news-2">' +
                                            '<div class="news-date">10 июня 2026</div>' +
                                            '<h3 class="news-item-title">Добавлены новые 4K каналы</h3>' +
                                            '<p class="news-item-desc">В премиальный пакет добавлены 15 новых каналов высокой четкости (UHD/4K) в спортивном и познавательном жанрах.</p>' +
                                        '</div>' +
                                        '<div class="news-item selector" data-card="news-3">' +
                                            '<div class="news-date">01 июня 2026</div>' +
                                            '<h3 class="news-item-title">Технические работы завершены</h3>' +
                                            '<p class="news-item-desc">Плановые работы на серверах трансляции успешно завершены. Скорость загрузки потоков выросла на 30%.</p>' +
                                        '</div>' +
                                    '</div>' +
                                '</div>' +
                            '</div>' +
                        '</div>';

                    html = $(dashboard_html);

                    html.find('.selector').on('hover:focus', function () {
                        active_element = $(this);
                        
                        if (active_element.hasClass('news-item')) {
                            var container = html.find('.news-list');
                            var itemTop = active_element.position().top;
                            var containerHeight = container.height();
                            var itemHeight = active_element.outerHeight();
                            
                            container.stop().animate({
                                scrollTop: container.scrollTop() + itemTop - (containerHeight / 2) + (itemHeight / 2)
                            }, 200);
                        }
                    });

                    html.find('.selector').on('hover:enter', function () {
                        var card = $(this).attr('data-card');
                        if (card === 'support') {
                            Lampa.Noty.show('Свяжитесь с нами в Telegram: @android_tv_shop');
                        } else if (card === 'promo') {
                            Lampa.Noty.show('Для подключения Premium обратитесь к @android_tv_shop');
                        } else if (card.indexOf('news-') === 0) {
                            var title = $(this).find('.news-item-title').text();
                            Lampa.Noty.show(title);
                        }
                    });

                    this.activity.toggle();
                };

                this.start = function () {
                    Lampa.Controller.add('content', {
                        toggle: function toggle() {
                            Lampa.Controller.collectionSet(html);
                            Lampa.Controller.collectionFocus(active_element || html.find('.selector').first()[0], html);
                        },
                        left: function left() {
                            if (Navigator.canmove('left')) Navigator.move('left');
                            else Lampa.Controller.toggle('menu');
                        },
                        right: function right() {
                            if (Navigator.canmove('right')) Navigator.move('right');
                        },
                        up: function up() {
                            if (Navigator.canmove('up')) Navigator.move('up');
                            else Lampa.Controller.toggle('head');
                        },
                        down: function down() {
                            if (Navigator.canmove('down')) Navigator.move('down');
                        },
                        back: function back() {
                            Lampa.Activity.backward();
                        }
                    });
                    Lampa.Controller.toggle('content');
                };

                this.pause = function () {};

                this.destroy = function () {
                    html.remove();
                };

                this.render = function () {
                    return html;
                };
            }

            Lampa.Component.add('main', CustomMain);
        };

        function loadCurrentLampa() {
            putScript('app.min.js?v=' + cache_version, function () {
                if (window.registerCustomMainComponent) window.registerCustomMainComponent();
            })
        }

        function loadLocalLampa(){
            if(lampa_url !== '') window.local_lampa = true

            loadCurrentLampa()
        }

        if (typeof AndroidJS !== "undefined"
            && !!AndroidJS.getLampaURL
            && /^https?:\/\//i.test(AndroidJS.getLampaURL())
            && !/^https?:\/\//i.test(location.href)
        ) {
            lampa_url = urlJoin(AndroidJS.getLampaURL(),'')
        }

        if (lampa_url !== '') {
            putScript(
                urlJoin(lampa_url, 'lampainit.js?v=' + cache_version),
                false,
                function(){}
            )

            putScript(
                urlJoin(lampa_url, 'app.min.js?v=' + cache_version),
                function () {
                    var css = urlJoin(lampa_url, 'css/app.css?v=' + cache_version)

                    $('head').append('<link rel="stylesheet" href="' + css + '">')
                    if (window.registerCustomMainComponent) window.registerCustomMainComponent();
                },
                function () {
                    putScript(
                        urlJoin(lampa_url, 'lampa-main/app.min.js?v=' + cache_version),
                        function () {
                            var css = urlJoin(lampa_url, 'lampa-main/css/app.css?v=' + cache_version)

                            $('head').append('<link rel="stylesheet" href="' + css + '">')

                            putScript(
                                urlJoin(lampa_url, 'lampainit.js?v=' + cache_version),
                                false,
                                function(){}
                            )
                            if (window.registerCustomMainComponent) window.registerCustomMainComponent();
                        },
                        loadLocalLampa
                    )
                }
            )
        }
        else{
            loadCurrentLampa()
        }
    </script>
